<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480">
    <title>Stats Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 800px;
            height: 480px;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #000;
            overflow: hidden;
        }
        .container {
            width: 800px;
            height: 480px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #000;
        }
        .title-red {
            border-color: #c00;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            flex: 1;
        }
        .stat-card {
            padding: 16px;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .stat-card-red {
            border-color: #c00;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            line-height: 1.2;
        }
        .stat-value-red {
            color: #c00;
        }
        .stat-label {
            font-size: 14px;
            margin-top: 8px;
            color: #333;
        }
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        .positive { color: #c00; }
        .negative { color: #666; }
        .footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #ccc;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title {{ title_class }}">{{ title }}</div>
        
        <div class="stats-grid">
            {{ stats }}
        </div>
        
        <div class="footer">{{ footer }}</div>
    </div>
</body>
</html>
